<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300">
  <defs>
    <linearGradient id="matrixGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#DC2626"/>
      <stop offset="100%" stop-color="#EF4444"/>
    </linearGradient>
  </defs>
  <g stroke="url(#matrixGradient)" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- 3x3 grid bounding box -->
    <rect x="90" y="90" width="120" height="120" rx="4" stroke-width="2.5"/>
    <!-- Internal grid lines -->
    <line x1="130" y1="90" x2="130" y2="210" stroke-width="2"/>
    <line x1="170" y1="90" x2="170" y2="210" stroke-width="2"/>
    <line x1="90" y1="130" x2="210" y2="130" stroke-width="2"/>
    <line x1="90" y1="170" x2="210" y2="170" stroke-width="2"/>
    <!-- Risk diagonal (top-left → bottom-right, filled cells = escalating risk) -->
    <rect x="93" y="93" width="34" height="34" rx="2" fill="url(#matrixGradient)" opacity="0.25" stroke="none"/>
    <rect x="133" y="133" width="34" height="34" rx="2" fill="url(#matrixGradient)" opacity="0.55" stroke="none"/>
    <rect x="173" y="173" width="34" height="34" rx="2" fill="url(#matrixGradient)" opacity="0.9" stroke="none"/>
  </g>
</svg>