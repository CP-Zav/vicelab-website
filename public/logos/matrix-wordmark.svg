<?xml version="1.0" encoding="UTF-8"?>
<!-- matrix-wordmark.svg | ViceLab ecosystem | Convert text to outlines before final deployment -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 72" fill="none">
  <rect width="320" height="72" fill="#0A0A0F"/>
  <defs>
    <filter id="glow" x="-20%" y="-40%" width="140%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- MATRIX wordmark -->
  <text
    x="32" y="48"
    font-family="'Inter','Helvetica Neue',Arial,sans-serif"
    font-size="34" font-weight="300"
    letter-spacing="8"
    fill="#00FF94"
    textLength="220" lengthAdjust="spacing"
    filter="url(#glow)">MATRIX</text>

  <!-- Grid dot row beneath text (logic/structure accent) -->
  <circle cx="32"  cy="60" r="1.5" fill="#00FF94" fill-opacity="0.55"/>
  <circle cx="54"  cy="60" r="1.5" fill="#00FF94" fill-opacity="0.4"/>
  <circle cx="76"  cy="60" r="1.5" fill="#00FF94" fill-opacity="0.55"/>
  <circle cx="98"  cy="60" r="1.5" fill="#00FF94" fill-opacity="0.4"/>
  <circle cx="120" cy="60" r="1.5" fill="#00FF94" fill-opacity="0.55"/>
  <circle cx="142" cy="60" r="2"   fill="#00FF94" filter="url(#glow)"/>
  <circle cx="164" cy="60" r="1.5" fill="#00FF94" fill-opacity="0.55"/>
  <circle cx="186" cy="60" r="1.5" fill="#00FF94" fill-opacity="0.4"/>
  <circle cx="208" cy="60" r="1.5" fill="#00FF94" fill-opacity="0.55"/>
  <circle cx="230" cy="60" r="1.5" fill="#00FF94" fill-opacity="0.4"/>
  <circle cx="252" cy="60" r="1.5" fill="#00FF94" fill-opacity="0.55"/>

  <!-- Connecting line through dots (grid row) -->
  <line x1="32" y1="60" x2="252" y2="60" stroke="#00FF94" stroke-width="0.5" stroke-opacity="0.15"/>

  <!-- Left structural tick mark -->
  <line x1="32" y1="12" x2="32" y2="20" stroke="#00FF94" stroke-width="1" stroke-opacity="0.35"/>
  <!-- Right structural tick mark -->
  <line x1="252" y1="12" x2="252" y2="20" stroke="#00FF94" stroke-width="1" stroke-opacity="0.35"/>
</svg>