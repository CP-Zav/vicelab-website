<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" fill="#0A0A0F"/>
  <defs>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- 3x3 node grid — nodes at 20, 40, 60 on both axes -->

  <!-- Outer connections (dim) -->
  <line x1="20" y1="20" x2="40" y2="20" stroke="#00FF94" stroke-width="0.75" stroke-opacity="0.18"/>
  <line x1="40" y1="20" x2="60" y2="20" stroke="#00FF94" stroke-width="0.75" stroke-opacity="0.18"/>
  <line x1="20" y1="60" x2="40" y2="60" stroke="#00FF94" stroke-width="0.75" stroke-opacity="0.18"/>
  <line x1="40" y1="60" x2="60" y2="60" stroke="#00FF94" stroke-width="0.75" stroke-opacity="0.18"/>
  <line x1="20" y1="20" x2="20" y2="40" stroke="#00FF94" stroke-width="0.75" stroke-opacity="0.18"/>
  <line x1="20" y1="40" x2="20" y2="60" stroke="#00FF94" stroke-width="0.75" stroke-opacity="0.18"/>
  <line x1="60" y1="20" x2="60" y2="40" stroke="#00FF94" stroke-width="0.75" stroke-opacity="0.18"/>
  <line x1="60" y1="40" x2="60" y2="60" stroke="#00FF94" stroke-width="0.75" stroke-opacity="0.18"/>

  <!-- Center-ring connections (brighter — synthesis point radiates) -->
  <line x1="20" y1="40" x2="40" y2="40" stroke="#00FF94" stroke-width="1" stroke-opacity="0.55"/>
  <line x1="40" y1="40" x2="60" y2="40" stroke="#00FF94" stroke-width="1" stroke-opacity="0.55"/>
  <line x1="40" y1="20" x2="40" y2="40" stroke="#00FF94" stroke-width="1" stroke-opacity="0.55"/>
  <line x1="40" y1="40" x2="40" y2="60" stroke="#00FF94" stroke-width="1" stroke-opacity="0.55"/>

  <!-- Outer corner nodes (small) -->
  <rect x="18" y="18" width="4" height="4" fill="#00FF94" fill-opacity="0.35"/>
  <rect x="58" y="18" width="4" height="4" fill="#00FF94" fill-opacity="0.35"/>
  <rect x="18" y="58" width="4" height="4" fill="#00FF94" fill-opacity="0.35"/>
  <rect x="58" y="58" width="4" height="4" fill="#00FF94" fill-opacity="0.35"/>

  <!-- Mid-edge nodes (slightly brighter) -->
  <rect x="38" y="18" width="4" height="4" fill="#00FF94" fill-opacity="0.5"/>
  <rect x="18" y="38" width="4" height="4" fill="#00FF94" fill-opacity="0.5"/>
  <rect x="58" y="38" width="4" height="4" fill="#00FF94" fill-opacity="0.5"/>
  <rect x="38" y="58" width="4" height="4" fill="#00FF94" fill-opacity="0.5"/>

  <!-- Center synthesis node (full brightness + glow) -->
  <rect x="37" y="37" width="6" height="6" fill="#00FF94" filter="url(#glow)"/>
</svg>