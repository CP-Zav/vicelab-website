<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" fill="none">
  <rect width="80" height="80" fill="#0A0A0F"/>
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Octagonal frame -->
  <polygon
    points="11,1 69,1 79,11 79,69 69,79 11,79 1,69 1,11"
    stroke="#00E5FF" stroke-width="0.75" stroke-opacity="0.22" fill="none"/>

  <!-- Corner accent marks — top-left and top-right -->
  <polyline points="1,20 1,11 11,1" stroke="#00E5FF" stroke-width="1.25" stroke-opacity="0.55" fill="none"/>
  <polyline points="69,1 79,11 79,20" stroke="#00E5FF" stroke-width="1.25" stroke-opacity="0.55" fill="none"/>

  <!-- Carrier baseline (faint) -->
  <line x1="5" y1="40" x2="75" y2="40" stroke="#00E5FF" stroke-width="0.75" stroke-opacity="0.18"/>

  <!-- Biphasic signal spike: flat → up → down → return -->
  <polyline
    points="5,40 23,40 28,15 34,65 39,40 75,40"
    stroke="#00E5FF" stroke-width="2" stroke-linecap="square" stroke-linejoin="miter"
    fill="none" filter="url(#glow)"/>

  <!-- Peak dot -->
  <circle cx="28" cy="15" r="2.5" fill="#00E5FF" filter="url(#glow)"/>
</svg>