  <circle cx="60" cy="64" r="44" stroke="#06B6D4" stroke-width="0.75" opacity="0.12"/>
  <circle cx="60" cy="64" r="30" stroke="#06B6D4" stroke-width="0.75" opacity="0.17"/>
  <circle cx="60" cy="64" r="16" stroke="#06B6D4" stroke-width="0.75" opacity="0.24"/>
  <path d="M15,64 L37,64 L47,54 L60,22 L68,92 L76,58 L93,58 L105,58"
        stroke="#00D5FF" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"
        filter="url(#siv-glow-wave)"/>
  <line x1="15" y1="60" x2="15" y2="68" stroke="#06B6D4" stroke-width="1" opacity="0.38"/>
  <line x1="105" y1="54" x2="105" y2="62" stroke="#06B6D4" stroke-width="1" opacity="0.38"/>
  <circle cx="60" cy="22" r="7"  stroke="#00FFA3" stroke-width="1.2" opacity="0.55" filter="url(#siv-glow-peak)"/>
